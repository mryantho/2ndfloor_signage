<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 3840px; 
      height: 1028px; 
      background: #000;
      overflow: hidden;
      position: relative;
    }
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }
    .slide.active { opacity: 1; }
    img { width: 100%; height: 100%; object-fit: fill; }
  </style>
</head>
<body>
  <div class="slide active"><img src="slide1.png"></div>
  <div class="slide"><img src="slide2.png"></div>
  <div class="slide"><img src="slide3.png"></div>
  <div class="slide"><img src="slide3.png"></div>

  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;
    const duration = 10000; // 10 seconds per slide
    
    setInterval(() => {
      slides[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
    }, duration);
  </script>
</body>
</html>
